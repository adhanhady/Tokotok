<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Produk</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <h2 class="text-center mb-4">Daftar Produk</h2>

      <!-- FILTER DAN SEARCH -->
      <div class="row mb-4">
        <!-- FILTER KATEGORI -->
        <div class="col-md-3">
          <label class="form-label">Filter Kategori</label>
          <select id="filterKategori" class="form-select">
            <option value="all">Semua Kategori</option>
            <option value="fashion">Fashion</option>
            <option value="kecantikan">Kecantikan</option>
            <option value="elektronik">Elektronik</option>
          </select>
        </div>

        <!-- FILTER HARGA -->
        <div class="col-md-3">
          <label class="form-label">Urutkan Harga</label>
          <select id="filterHarga" class="form-select">
            <option value="none">Tanpa Urutan</option>
            <option value="asc">Harga Terendah</option>
            <option value="desc">Harga Tertinggi</option>
          </select>
        </div>

        <!-- SEARCH -->
        <div class="col-md-6">
          <label class="form-label">Cari Produk</label>
          <input
            type="text"
            id="searchInput"
            class="form-control"
            placeholder="Cari nama produk..."
          />
        </div>
      </div>

      <!-- LIST PRODUK -->
      <div class="row" id="productList"></div>
    </div>

    <script>
      // DATA PRODUK
      const products = [
        {
          name: "Daster Motif Sakura",
          desc: "Daster lembut dan adem dengan motif sakura.",
          price: 75000,
          img: "https://via.placeholder.com/250",
          category: "fashion",
        },
        {
          name: "Lip Serum Glow",
          desc: "Serum bibir agar tampak sehat dan glossy.",
          price: 45000,
          img: "https://via.placeholder.com/250",
          category: "kecantikan",
        },
        {
          name: "Hair Dryer Mini",
          desc: "Hair dryer portable cocok untuk dibawa bepergian.",
          price: 120000,
          img: "https://via.placeholder.com/250",
          category: "elektronik",
        },
        {
          name: "Outer Rajut Premium",
          desc: "Outer rajut halus, cocok untuk OOTD.",
          price: 99000,
          img: "https://via.placeholder.com/250",
          category: "fashion",
        },
        {
          name: "Face Wash Gentle",
          desc: "Sabun wajah lembut untuk semua jenis kulit.",
          price: 55000,
          img: "https://via.placeholder.com/250",
          category: "kecantikan",
        },
      ];

      const productListEl = document.getElementById("productList");
      const filterKategori = document.getElementById("filterKategori");
      const filterHarga = document.getElementById("filterHarga");
      const searchInput = document.getElementById("searchInput");

      // FUNTION MENAMPILKAN PRODUK
      function displayProducts(list) {
        productListEl.innerHTML = "";

        if (list.length === 0) {
          productListEl.innerHTML =
            "<p class='text-center text-muted'>Produk tidak ditemukan</p>";
          return;
        }

        list.forEach((p) => {
          productListEl.innerHTML += `
                <div class="col-md-4 mb-4">
                    <div class="card shadow-sm">
                        <img src="${p.img}" class="card-img-top" alt="produk">
                        <div class="card-body">
                            <h5 class="card-title">${p.name}</h5>
                            <p class="card-text">${p.desc}</p>
                            <p class="fw-bold text-primary">Rp ${p.price.toLocaleString()}</p>
                            <span class="badge bg-secondary">${p.category}</span>
                        </div>
                    </div>
                </div>
            `;
        });
      }

      // FILTER + SEARCH
      function applyFilters() {
        let filtered = [...products];

        // Filter kategori
        if (filterKategori.value !== "all") {
          filtered = filtered.filter(
            (p) => p.category === filterKategori.value,
          );
        }

        // Filter harga
        if (filterHarga.value === "asc") {
          filtered.sort((a, b) => a.price - b.price);
        } else if (filterHarga.value === "desc") {
          filtered.sort((a, b) => b.price - a.price);
        }

        // Search produk
        const searchText = searchInput.value.toLowerCase();
        filtered = filtered.filter((p) =>
          p.name.toLowerCase().includes(searchText),
        );

        displayProducts(filtered);
      }

      // EVENT LISTENER
      filterKategori.addEventListener("change", applyFilters);
      filterHarga.addEventListener("change", applyFilters);
      searchInput.addEventListener("keyup", applyFilters);

      // TAMPILKAN SEMUA SAAT AWAL
      displayProducts(products);
    </script>
  </body>
</html>
